services:
  postgres:
    image: postgres:16-alpine
    container_name: onx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onx_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-onx_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./drizzle/0002_atlas_v5_trains_nz.sql:/docker-entrypoint-initdb.d/01_migration.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onx_app} -d ${POSTGRES_DB:-onx_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - onx-network

  app:
    image: ${IMAGE_TAG:-ghcr.io/onxos/onx-deploy:staging-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL}
        ONX_FOUNDER_EMAIL: ${ONX_FOUNDER_EMAIL}
        ONX_FOUNDER_PASSWORD: ${ONX_FOUNDER_PASSWORD}
        ONX_FOUNDER_NAME: ${ONX_FOUNDER_NAME:-ONX Founder}
    container_name: onx-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      ONX_FOUNDER_EMAIL: ${ONX_FOUNDER_EMAIL}
      ONX_FOUNDER_PASSWORD: ${ONX_FOUNDER_PASSWORD}
      ONX_FOUNDER_NAME: ${ONX_FOUNDER_NAME:-ONX Founder}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r=await fetch('http://localhost:3000/api/health'); process.exit(r.ok?0:1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - onx-network

  nginx:
    image: nginx:alpine
    container_name: onx-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - onx-network

volumes:
  postgres_data:
    driver: local

networks:
  onx-network:
    driver: bridge
