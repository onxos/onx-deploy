name: Biome Auto-Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: kimi/master-reconciliation-remediation
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bunx @biomejs/biome check --write src/app src/server/db/schema src/components/data-table.tsx
      - name: Commit fixes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "fix(lint): auto-fix biome errors" && git push)
