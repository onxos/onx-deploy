name: Final Lint Fix
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: kimi/master-reconciliation-remediation
      - name: Fix execution-records.ts
        run: sed -i 's/trainId: AtlasTrainId/_trainId: AtlasTrainId/' src/lib/atlas-v5/execution-records.ts
      - name: Fix root.ts with biome
        uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bunx @biomejs/biome check --write --unsafe src/server/api/root.ts
      - name: Commit via API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const files = execSync('git diff --name-only').toString().trim().split('\n').filter(f => f);
            if (files.length === 0) { console.log('No changes'); return; }
            const { data: ref } = await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/kimi/master-reconciliation-remediation' });
            const headSha = ref.object.sha;
            const { data: headCommit } = await github.rest.git.getCommit({ owner: context.repo.owner, repo: context.repo.repo, commit_sha: headSha });
            const baseTreeSha = headCommit.tree.sha;
            const treeItems = [];
            for (const file of files) {
              const content = fs.readFileSync(file, 'utf8');
              const { data: blob } = await github.rest.git.createBlob({ owner: context.repo.owner, repo: context.repo.repo, content: content, encoding: 'utf-8' });
              treeItems.push({ path: file, mode: '100644', type: 'blob', sha: blob.sha });
            }
            const { data: newTree } = await github.rest.git.createTree({ owner: context.repo.owner, repo: context.repo.repo, base_tree: baseTreeSha, tree: treeItems });
            const { data: newCommit } = await github.rest.git.createCommit({ owner: context.repo.owner, repo: context.repo.repo, message: 'fix(lint): final 3 errors', tree: newTree.sha, parents: [headSha] });
            await github.rest.git.updateRef({ owner: context.repo.owner, repo: context.repo.repo, ref: 'heads/kimi/master-reconciliation-remediation', sha: newCommit.sha });
            console.log('Committed ' + files.length + ' files');
